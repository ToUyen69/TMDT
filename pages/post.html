<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bài viết — Nhành</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="../public/logo/logo TMĐT.jpg">
<link rel="stylesheet" href="../assets/css/style.css?v=70">
</head>
<body>

<div class="wrap"><nav class="breadcrumb" id="crumb"></nav></div>

<article class="section-sm" style="padding-top:0">
  <div class="narrow">
    <div class="center" id="postHead"></div>
    <div class="post-cover" id="postCover"></div>
    <div class="post-body" id="postBody"></div>
  </div>
</article>

<section class="section bg-cream">
  <div class="wrap">
    <div class="section-head center"><span class="eyebrow">Đọc thêm</span><h2>Bài viết khác</h2></div>
    <div class="blog-grid" id="more"></div>
  </div>
</section>

<script src="../assets/js/data.js?v=70"></script>
<script src="../assets/js/app.js?v=70"></script>
<script>
document.addEventListener('nhanh:ready', function () {
  var D = window.NHANH, NH = window.NH;
  var post = D.posts.find(function (p) { return p.slug === NH.getParam('slug'); }) || D.posts[0];
  document.title = post.title + ' — Nhành';

  NH.qs('#crumb').innerHTML = '<a href="../index.html">Trang chủ</a><span class="sep">/</span><a href="blog.html">Bài viết</a><span class="sep">/</span><span>' + post.title + '</span>';
  NH.qs('#postHead').innerHTML = '<div class="blog-meta center" style="justify-content:center"><span>' + post.cat + '</span><span>' + post.date + '</span><span>' + post.read + '</span></div>' +
    '<h1 style="margin-top:14px">' + post.title + '</h1>';
  NH.qs('#postCover').innerHTML = '<img src="' + NH.img(post.cover) + '" alt="">';
  NH.qs('#postBody').innerHTML = post.body.map(function (b) {
    if (b.indexOf('<h3>') === 0) {
      var idx = b.indexOf('</h3>') + 5;
      return b.slice(0, idx) + (b.slice(idx).trim() ? '<p>' + b.slice(idx) + '</p>' : '');
    }
    return '<p>' + b + '</p>';
  }).join('');

  var more = D.posts.filter(function (p) { return p.slug !== post.slug; }).slice(0, 3);
  NH.qs('#more').innerHTML = more.map(function (p) {
    return '<a class="blog-card reveal" href="post.html?slug=' + p.slug + '"><div class="bc-media"><img src="' + NH.img(p.cover) + '" alt=""></div><div class="bc-body"><div class="blog-meta"><span>' + p.cat + '</span><span>' + p.read + '</span></div><h3>' + p.title + '</h3><p>' + p.excerpt + '</p></div></a>';
  }).join('');
  NH.observeReveal(document);
  window.scrollTo(0, 0);
});
</script>
</body>
</html>
